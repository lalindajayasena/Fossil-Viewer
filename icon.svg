<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a6a4a"/>
      <stop offset="100%" stop-color="#5c4530"/>
    </linearGradient>
    <linearGradient id="logGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b5138"/>
      <stop offset="100%" stop-color="#453221"/>
    </linearGradient>
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7a5c3e"/>
      <stop offset="70%" stop-color="#5c4530"/>
      <stop offset="100%" stop-color="#3e2e1e"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" rx="34" fill="#2a2620"/>

  <!-- L: vertical log with end-grain top, small branch stub -->
  <g>
    <rect x="26" y="55" width="26" height="105" rx="13" fill="url(#logGrad)"/>
    <ellipse cx="39" cy="58" rx="13" ry="8" fill="url(#ringGrad)"/>
    <rect x="26" y="140" width="46" height="20" rx="10" fill="url(#logGrad)"/>
    <ellipse cx="69" cy="150" rx="10" ry="9" fill="url(#ringGrad)" transform="rotate(90 69 150)"/>
    <!-- moss/leaf accents -->
    <ellipse cx="30" cy="90" rx="5" ry="8" fill="#5c7a3e" opacity="0.85" transform="rotate(-20 30 90)"/>
    <ellipse cx="48" cy="115" rx="4" ry="7" fill="#4a6a34" opacity="0.8" transform="rotate(15 48 115)"/>
  </g>

  <!-- D: log ring for the curve, vertical log for the spine -->
  <g>
    <rect x="82" y="42" width="24" height="118" rx="12" fill="url(#logGrad)"/>
    <ellipse cx="94" cy="45" rx="12" ry="7" fill="url(#ringGrad)"/>
    <path d="M94,50 C130,50 150,72 150,101 C150,130 130,152 94,152 L94,132 C118,132 130,118 130,101 C130,84 118,70 94,70 Z" fill="url(#logGradDark)"/>
    <ellipse cx="112" cy="101" rx="19" ry="17" fill="#2a2620"/>
    <ellipse cx="30" cy="90" rx="0" ry="0"/>
    <ellipse cx="141" cy="60" rx="4" ry="7" fill="#5c7a3e" opacity="0.8" transform="rotate(30 141 60)"/>
  </g>

  <!-- J: hooked log, curved bottom like a fallen branch -->
  <g>
    <rect x="150" y="42" width="24" height="88" rx="12" fill="url(#logGrad)"/>
    <ellipse cx="162" cy="45" rx="12" ry="7" fill="url(#ringGrad)"/>
    <path d="M150,120 C150,142 138,158 116,160 C104,161 94,158 88,150 L104,136 C108,140 113,141 118,140 C126,139 130,133 130,122 L130,110 L150,110 Z" fill="url(#logGrad)"/>
    <ellipse cx="90" cy="151" rx="9" ry="8" fill="url(#ringGrad)" transform="rotate(-40 90 151)"/>
    <ellipse cx="168" cy="80" rx="4" ry="7" fill="#4a6a34" opacity="0.8" transform="rotate(-15 168 80)"/>
  </g>

  <!-- subtle wood grain texture lines -->
  <g stroke="#3e2e1e" stroke-width="1" opacity="0.4" fill="none">
    <path d="M30,70 L30,150"/>
    <path d="M46,65 L46,155"/>
    <path d="M86,60 L86,155"/>
    <path d="M102,55 L102,150"/>
    <path d="M154,60 L154,120"/>
    <path d="M170,55 L170,105"/>
  </g>
</svg>
