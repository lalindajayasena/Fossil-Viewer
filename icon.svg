<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Original T-Rex skull, side profile, open jaw, line-art style, transparent background -->
  <g fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <!-- Upper skull / cranium -->
    <path d="
      M20,95
      C18,75 30,55 55,45
      C80,35 115,32 140,42
      C155,48 168,58 172,70
      C174,76 172,82 166,84
      L172,92
      C176,96 174,102 168,104
      L158,106
      L156,116
      C154,122 148,124 144,120
      L138,112
      C120,118 95,120 78,114
      Z"
      fill="#ffffff"/>

    <!-- Lower jaw -->
    <path d="
      M25,100
      C22,110 24,122 34,132
      C50,148 78,156 105,152
      C122,150 136,142 142,130
      L132,124
      C120,132 100,136 82,132
      C64,128 48,118 40,104
      Z"
      fill="#ffffff"/>

    <!-- Eye socket -->
    <ellipse cx="95" cy="70" rx="14" ry="18" fill="#1a1a1a" stroke="none"/>

    <!-- Nostril opening -->
    <ellipse cx="150" cy="62" rx="9" ry="6" fill="#1a1a1a" stroke="none" transform="rotate(-15 150 62)"/>

    <!-- Fenestra (skull opening behind eye) -->
    <ellipse cx="125" cy="66" rx="10" ry="14" fill="#1a1a1a" stroke="none" transform="rotate(10 125 66)"/>

    <!-- Upper teeth -->
    <path d="M40,108 L44,96 L50,109 L54,94 L60,110 L65,93 L71,111 L77,95 L83,112 L90,97 L96,113 L104,99 L110,114 L118,101 L124,115 L132,105 L136,116" stroke-width="4"/>

    <!-- Lower teeth -->
    <path d="M40,120 L44,132 L49,119 L54,134 L59,120 L65,135 L72,122 L79,136 L87,124 L95,137 L104,126 L112,136" stroke-width="4"/>

    <!-- Cracks / suture lines for fossil texture -->
    <path d="M70,48 L74,60 M100,40 L96,52 M130,45 L126,56" stroke-width="2" opacity="0.55"/>
  </g>
</svg>
