<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Time Fossil Viewer</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0d0f">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #0d0d0f;
    font-family: -apple-system, Roboto, Arial, sans-serif;
  }
  #canvas-container {
    width: 100%;
    height: 100%;
  }
  #ui {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 14px;
    box-sizing: border-box;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0));
    z-index: 10;
    pointer-events: none;
  }
  #ui * { pointer-events: auto; }
  #title {
    color: #f2e9d8;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  #fileInput {
    display: none;
  }
  .btn {
    display: inline-block;
    background: #caa45c;
    color: #1a1a1a;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    border: none;
    cursor: pointer;
  }
  .btn:active {
    background: #b8944e;
  }
  #status {
    color: #cfcfcf;
    font-size: 13px;
    margin-top: 8px;
    min-height: 18px;
  }
  #hint {
    position: fixed;
    bottom: 14px;
    left: 14px;
    right: 14px;
    color: #999;
    font-size: 12px;
    text-align: center;
    z-index: 10;
  }
  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #caa45c;
    font-size: 15px;
    display: none;
    z-index: 20;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <div id="title">🦴 Deep Time Fossil Viewer</div>
  <label for="fileInput" class="btn">Load Fossil File</label>
  <input type="file" id="fileInput" accept=".stl,.obj,.ply,.glb,.gltf">
  <div id="status">No file loaded. Supports STL, OBJ, PLY, GLB.</div>
  <div id="flipControls" style="margin-top:8px; display:none;">
    <button class="btn" id="flipXBtn" style="margin-right:6px;">Flip ↔</button>
    <button class="btn" id="flipYBtn" style="margin-right:6px;">Flip ↕</button>
    <button class="btn" id="resetBtn">Reset View</button>
  </div>
</div>

<div id="loading">Loading model...</div>
<div id="hint">Drag to rotate · Pinch to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const container = document.getElementById('canvas-container');
const statusEl = document.getElementById('status');
const loadingEl = document.getElementById('loading');
const fileInput = document.getElementById('fileInput');

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0f);

const camera = new THREE.PerspectiveCamera(
  50, window.innerWidth / window.innerHeight, 0.01, 5000
);
camera.position.set(0, 0, 5);

// Light attached to camera so the model is always lit, no matter how it's rotated
const cameraLight = new THREE.PointLight(0xffffff, 0.8, 0, 0.3);
camera.add(cameraLight);
scene.add(camera);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.35));

// Key light — strong, low-angle, casts shadows to reveal surface relief
const keyLight = new THREE.DirectionalLight(0xfff2dd, 2.2);
keyLight.position.set(6, 4, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 50;
keyLight.shadow.camera.left = -5;
keyLight.shadow.camera.right = 5;
keyLight.shadow.camera.top = 5;
keyLight.shadow.camera.bottom = -5;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);

// Raking light from the side — brings out fine surface cracks/relief via shadow contrast
const rakingLight1 = new THREE.DirectionalLight(0xfff4e0, 1.6);
rakingLight1.position.set(9, 0.5, 0);
scene.add(rakingLight1);
const rakingLight2 = new THREE.DirectionalLight(0xe0eaff, 1.1);
rakingLight2.position.set(-9, 0.5, 1);
scene.add(rakingLight2);

const fillLight = new THREE.HemisphereLight(0xffffff, 0x3a3a3a, 0.4);
scene.add(fillLight);

// Grid for reference
const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
grid.position.y = -1.5;
scene.add(grid);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

let currentModel = null;

function clearCurrentModel() {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse((child) => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => m.dispose());
        } else {
          child.material.dispose();
        }
      }
    });
    currentModel = null;
  }
}

function frameModel(object) {
  // Force world matrix update before measuring
  object.updateMatrixWorld(true);

  let box = new THREE.Box3().setFromObject(object);

  if (box.isEmpty()) {
    setStatus('Warning: model appears to have no visible geometry.');
    return;
  }

  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  // Re-center the object at the origin
  object.position.x -= center.x;
  object.position.y -= center.y;
  object.position.z -= center.z;

  const maxDim = Math.max(size.x, size.y, size.z, 0.0001);
  const targetSize = 2.5;
  const scale = targetSize / maxDim;
  object.scale.setScalar(scale);

  // Recompute box after scaling/centering to get accurate framing
  object.updateMatrixWorld(true);
  box = new THREE.Box3().setFromObject(object);
  const newSize = box.getSize(new THREE.Vector3());
  const newCenter = box.getCenter(new THREE.Vector3());

  const fitRadius = newSize.length() * 0.5 || 1;
  const fov = camera.fov * (Math.PI / 180);
  const distance = Math.max((fitRadius / Math.sin(fov / 2)) * 1.4, 1.5);

  camera.near = distance / 100;
  camera.far = distance * 100;
  camera.updateProjectionMatrix();

  camera.position.set(
    newCenter.x + distance * 0.5,
    newCenter.y + distance * 0.35,
    newCenter.z + distance
  );
  camera.lookAt(newCenter);
  controls.target.copy(newCenter);
  controls.update();
}

function defaultMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0xcbb894,
    metalness: 0.0,
    roughness: 0.85,
    flatShading: false,
    side: THREE.DoubleSide
  });
}

function addMeshToScene(mesh) {
  clearCurrentModel();
  currentModel = mesh;
  mesh.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  scene.add(mesh);
  frameModel(mesh);
  document.getElementById('flipControls').style.display = 'block';
}

const flipXBtn = document.getElementById('flipXBtn');
const flipYBtn = document.getElementById('flipYBtn');

flipXBtn.addEventListener('click', () => {
  if (currentModel) {
    currentModel.rotation.y += Math.PI;
  }
});

flipYBtn.addEventListener('click', () => {
  if (currentModel) {
    currentModel.rotation.x += Math.PI;
  }
});

const resetBtn = document.getElementById('resetBtn');
resetBtn.addEventListener('click', () => {
  if (currentModel) {
    frameModel(currentModel);
  }
});

function setStatus(text) {
  statusEl.textContent = text;
}

function loadFile(file) {
  const name = file.name.toLowerCase();
  const ext = name.substring(name.lastIndexOf('.') + 1);
  const reader = new FileReader();

  loadingEl.style.display = 'block';
  setStatus('Loading: ' + file.name);

  reader.onerror = () => {
    loadingEl.style.display = 'none';
    setStatus('Error reading file.');
  };

  if (ext === 'stl') {
    reader.onload = (e) => {
      try {
        const loader = new STLLoader();
        const geometry = loader.parse(e.target.result);
        geometry.computeVertexNormals();
        const mesh = new THREE.Mesh(geometry, defaultMaterial());
        addMeshToScene(mesh);
        setStatus('Loaded: ' + file.name);
      } catch (err) {
        setStatus('Failed to parse STL: ' + err.message);
      }
      loadingEl.style.display = 'none';
    };
    reader.readAsArrayBuffer(file);

  } else if (ext === 'obj') {
    reader.onload = (e) => {
      try {
        const loader = new OBJLoader();
        const object = loader.parse(e.target.result);
        object.traverse((child) => {
          if (child.isMesh) {
            child.material = defaultMaterial();
          }
        });
        addMeshToScene(object);
        setStatus('Loaded: ' + file.name);
      } catch (err) {
        setStatus('Failed to parse OBJ: ' + err.message);
      }
      loadingEl.style.display = 'none';
    };
    reader.readAsText(file);

  } else if (ext === 'ply') {
    reader.onload = (e) => {
      try {
        const loader = new PLYLoader();
        const geometry = loader.parse(e.target.result);

        const vertCount = geometry.hasAttribute('position') ? geometry.attributes.position.count : 0;
        const hasIndex = geometry.index !== null;
        const faceCount = hasIndex ? geometry.index.count / 3 : 0;

        if (vertCount === 0) {
          setStatus('PLY file has no readable vertex data.');
          loadingEl.style.display = 'none';
          return;
        }

        let object;
        const colorAttr = geometry.getAttribute('color');
        const hasRealColor = colorAttr && colorAttr.count === vertCount;

        if (hasIndex && faceCount > 0) {
          // Normal mesh with faces
          if (!geometry.hasAttribute('normal')) {
            geometry.computeVertexNormals();
          }
          const material = hasRealColor
            ? new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.7, side: THREE.DoubleSide })
            : (() => { const m = defaultMaterial(); m.side = THREE.DoubleSide; return m; })();
          object = new THREE.Mesh(geometry, material);
          setStatus('Loaded: ' + file.name + ' (' + vertCount + ' verts, ' + Math.round(faceCount) + ' faces)');
        } else {
          // No faces present — render as a point cloud so it's still visible
          const material = hasRealColor
            ? new THREE.PointsMaterial({ vertexColors: true, size: 0.02 })
            : new THREE.PointsMaterial({ color: 0xcaa45c, size: 0.02 });
          object = new THREE.Points(geometry, material);
          setStatus('Loaded: ' + file.name + ' as point cloud (' + vertCount + ' points, no face data found)');
        }

        addMeshToScene(object);
      } catch (err) {
        setStatus('Failed to parse PLY: ' + err.message);
      }
      loadingEl.style.display = 'none';
    };
    reader.readAsArrayBuffer(file);

  } else if (ext === 'glb' || ext === 'gltf') {
    reader.onload = (e) => {
      const loader = new GLTFLoader();
      loader.parse(e.target.result, '', (gltf) => {
        addMeshToScene(gltf.scene);
        setStatus('Loaded: ' + file.name);
        loadingEl.style.display = 'none';
      }, (err) => {
        setStatus('Failed to parse GLB/GLTF: ' + err.message);
        loadingEl.style.display = 'none';
      });
    };
    reader.readAsArrayBuffer(file);

  } else {
    setStatus('Unsupported file type: .' + ext);
    loadingEl.style.display = 'none';
  }
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

// Handle window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(() => {
      console.log('Service worker registered — app now works offline.');
    }).catch((err) => {
      console.warn('Service worker registration failed:', err);
    });
  });
}
</script>

</body>
</html>
